<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VerifProxy WASM Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; }
    header .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 9999px;
      background: #2d6a4f;
      color: #b7e4c7;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── Left panel ─────────────────────────────────────── */
    .panel {
      border-right: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
    }

    section {
      border-bottom: 1px solid #2d3748;
      padding: 1.25rem;
    }

    section h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 0.85rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: #a0aec0;
      margin-bottom: 0.3rem;
      margin-top: 0.75rem;
    }

    label:first-of-type { margin-top: 0; }

    input, textarea, select {
      width: 100%;
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.82rem;
      padding: 0.5rem 0.65rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #4299e1;
    }

    textarea { resize: vertical; min-height: 60px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-family: inherit;
      padding: 0.5rem 1rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: 0.85; }

    .btn-primary { background: #3182ce; color: #fff; width: 100%; margin-top: 0.85rem; }
    .btn-danger  { background: #c53030; color: #fff; width: 100%; margin-top: 0.5rem; }

    #status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #718096;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    #status-dot.running  { background: #48bb78; box-shadow: 0 0 6px #48bb78; }
    #status-dot.error    { background: #fc8181; box-shadow: 0 0 6px #fc8181; }

    #status-text { font-size: 0.82rem; color: #a0aec0; }

    /* ── Right panel ────────────────────────────────────── */
    .output-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-toolbar {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-toolbar h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
    }

    .btn-clear {
      background: transparent;
      color: #718096;
      border: 1px solid #2d3748;
      padding: 0.3rem 0.65rem;
      font-size: 0.75rem;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .log-entry {
      border-radius: 6px;
      padding: 0.65rem 0.85rem;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .log-entry .meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .log-entry .ts {
      font-size: 0.7rem;
      color: #4a5568;
    }

    .log-entry .tag {
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .log-entry.info  { background: #1a202c; }
    .log-entry.ok    { background: #1c3529; }
    .log-entry.err   { background: #2d1515; }
    .log-entry.warn  { background: #2d2415; }

    .log-entry.info .tag  { background: #2d3748; color: #a0aec0; }
    .log-entry.ok .tag    { background: #2d6a4f; color: #b7e4c7; }
    .log-entry.err .tag   { background: #742a2a; color: #fc8181; }
    .log-entry.warn .tag  { background: #744210; color: #f6ad55; }

    .log-entry pre {
      white-space: pre-wrap;
      word-break: break-all;
      font-family: ui-monospace, monospace;
      font-size: 0.78rem;
      color: #cbd5e0;
      margin-top: 0.25rem;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2d3748;
      gap: 0.5rem;
    }

    .empty-state svg { opacity: 0.4; }
    .empty-state p { font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>VerifProxy WASM Demo</h1>
  <span class="badge">WASM</span>
</header>

<main>
  <!-- ── Left panel ──────────────────────────────────────── -->
  <div class="panel">

    <!-- Status -->
    <section>
      <h2>Status</h2>
      <span id="status-dot"></span>
      <span id="status-text">Not started</span>
    </section>

    <!-- Config -->
    <section>
      <h2>Configuration</h2>

      <label>Eth2 Network</label>
      <select id="cfg-network">
        <option value="mainnet">mainnet</option>
        <option value="holesky">holesky</option>
        <option value="sepolia">sepolia</option>
      </select>

      <label>Trusted Block Root</label>
      <input id="cfg-root" type="text"
        value="0xe9a99b9d2fedae780a6b0347914c88a0143eedfe3c59e7854a8d913a09d9ab8c"
        placeholder="0x…" />

      <label>Execution API URLs (comma-separated)</label>
      <input id="cfg-exec" type="text"
        value="https://eth.blockrazor.xyz,https://eth.nimbus.xyz"
        placeholder="https://…" />

      <label>Beacon API URLs (comma-separated)</label>
      <input id="cfg-beacon" type="text"
        value="http://testing.mainnet.beacon-api.nimbus.team,http://www.lightclientdata.org"
        placeholder="http://…" />

      <label>Log Level</label>
      <select id="cfg-loglevel">
        <option value="FATAL">FATAL</option>
        <option value="ERROR">ERROR</option>
        <option value="WARN">WARN</option>
        <option value="INFO">INFO</option>
        <option value="DEBUG">DEBUG</option>
        <option value="TRACE">TRACE</option>
      </select>

      <button class="btn-primary" id="btn-start">Start Proxy</button>
      <button class="btn-danger"  id="btn-stop" disabled>Stop Proxy</button>
    </section>

    <!-- RPC Call -->
    <section>
      <h2>RPC Call</h2>

      <label>Method</label>
      <select id="rpc-method">
        <option>eth_blockNumber</option>
        <option>eth_gasPrice</option>
        <option>eth_blobBaseFee</option>
        <option>eth_maxPriorityFeePerGas</option>
        <option>eth_getBalance</option>
        <option>eth_getTransactionCount</option>
        <option>eth_getCode</option>
        <option>eth_getStorageAt</option>
        <option>eth_getBlockByNumber</option>
        <option>eth_getBlockByHash</option>
        <option>eth_getBlockTransactionCountByNumber</option>
        <option>eth_getBlockReceipts</option>
        <option>eth_getTransactionByHash</option>
        <option>eth_getTransactionReceipt</option>
        <option>eth_getLogs</option>
        <option>eth_call</option>
        <option>eth_estimateGas</option>
      </select>

      <label>Params (JSON array)</label>
      <textarea id="rpc-params" rows="3">[]</textarea>

      <button class="btn-primary" id="btn-call" disabled>Send</button>
    </section>

    <!-- Quick calls -->
    <section>
      <h2>Quick Calls</h2>
      <div style="display:flex;flex-direction:column;gap:0.4rem;margin-top:0.25rem">
        <button class="btn-clear" data-quick='["eth_blockNumber","[]"]'>eth_blockNumber</button>
        <button class="btn-clear" data-quick='["eth_gasPrice","[]"]'>eth_gasPrice</button>
        <button class="btn-clear" data-quick='["eth_getBalance","[\"0x954a86C613fd1fBaC9C7A43a071A68254C75E4AC\",\"latest\"]"]'>eth_getBalance (example addr)</button>
        <button class="btn-clear" data-quick='["eth_getBlockByNumber","[\"latest\",false]"]'>eth_getBlockByNumber (latest)</button>
      </div>
    </section>

  </div>

  <!-- ── Right panel ─────────────────────────────────────── -->
  <div class="output-area">
    <div class="output-toolbar">
      <h2>Output Log</h2>
      <button class="btn-clear" id="btn-clear">Clear</button>
    </div>
    <div id="log">
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3M5.25 3h13.5A2.25 2.25 0 0121 5.25v13.5A2.25 2.25 0 0118.75 21H5.25A2.25 2.25 0 013 18.75V5.25A2.25 2.25 0 015.25 3z" />
        </svg>
        <p>Start the proxy, then make RPC calls.</p>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import NimbusVerifiedProxy from './wasm_glue.js';

  const LOG = '[verifproxy:ui]';
  let proxy = null;

  const $ = id => document.getElementById(id);

  function setStatus(state, text) {
    $('status-dot').className = state;
    $('status-text').textContent = text;
  }

  function addLog(type, label, body) {
    const empty = $('empty-state');
    if (empty) empty.remove();

    const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.innerHTML = `
      <div class="meta">
        <span class="tag">${label}</span>
        <span class="ts">${ts}</span>
      </div>
      <pre>${body}</pre>`;
    $('log').appendChild(entry);
    $('log').scrollTop = $('log').scrollHeight;
  }

  function buildConfig() {
    return JSON.stringify({
      eth2Network:       $('cfg-network').value,
      trustedBlockRoot:  $('cfg-root').value.trim(),
      executionApiUrls:  $('cfg-exec').value.trim(),
      beaconApiUrls:     $('cfg-beacon').value.trim(),
      logLevel:          $('cfg-loglevel').value,
      logStdout:         'None',
    });
  }

  function onProxyStopped() {
    proxy = null;
    $('btn-start').disabled = false;
    $('btn-stop').disabled = true;
    $('btn-call').disabled = true;
  }

  async function proxyExecutionTransport(url, name, params) {
    const r = await fetch('/proxy?url=' + encodeURIComponent(url), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: name, params }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    const rpc = await r.json();
    if (rpc.error) throw new Error(rpc.error.message ?? JSON.stringify(rpc.error));
    return JSON.stringify(rpc.result ?? null);
  }

  async function proxyBeaconTransport(url, endpoint, params) {
    const base = '/eth/v1/beacon/light_client';
    let path;
    switch (endpoint) {
      case 'getLightClientBootstrap':
        path = `${base}/bootstrap/0x${params.block_root}`; break;
      case 'getLightClientUpdatesByRange':
        path = `${base}/updates?start_period=${params.start_period}&count=${params.count}`; break;
      case 'getLightClientOptimisticUpdate':
        path = `${base}/optimistic_update`; break;
      case 'getLightClientFinalityUpdate':
        path = `${base}/finality_update`; break;
      default:
        throw new Error(`unknown beacon endpoint: ${endpoint}`);
    }
    const fetchUrl = url + path;
    const r = await fetch('/proxy?url=' + encodeURIComponent(fetchUrl), {
      headers: { 'Accept': 'application/json' }
    });
    return r.text();
  }

  $('btn-start').addEventListener('click', async () => {
    if (proxy !== null) return;
    $('btn-start').disabled = true;
    setStatus('', 'Starting…');
    addLog('info', 'INFO', 'Initialising WASM module…');

    const cfg = buildConfig();
    console.group(LOG, 'proxy.init');
    console.log('config', JSON.parse(cfg));
    console.groupEnd();

    try {
      proxy = new NimbusVerifiedProxy();
      await proxy.init(cfg, {
        executionTransport: proxyExecutionTransport,
        beaconTransport: proxyBeaconTransport
      });
    } catch (err) {
      console.error(LOG, 'proxy.init failed', err);
      setStatus('error', 'Error');
      addLog('err', 'ERROR', String(err));
      onProxyStopped();
      return;
    }

    setStatus('running', 'Running');
    addLog('ok', 'STARTED', 'Proxy is running.');
    console.log(LOG, 'proxy running');
    $('btn-stop').disabled = false;
    $('btn-call').disabled = false;
  });

  $('btn-stop').addEventListener('click', () => {
    if (proxy === null) return;
    console.log(LOG, 'proxy.destroy called');
    proxy.destroy();
    onProxyStopped();
    setStatus('', 'Stopped');
    addLog('info', 'STOPPED', 'Proxy stopped.');
  });

  async function doCall(method, paramsStr) {
    if (proxy === null) return;
    let parsedParams;
    try {
      parsedParams = JSON.parse(paramsStr);
    } catch {
      console.warn(LOG, 'invalid JSON params', paramsStr);
      addLog('err', 'PARSE', `Invalid JSON params: ${paramsStr}`);
      return;
    }
    console.group(LOG, 'rpc →', method);
    console.log('params', parsedParams);
    addLog('info', 'REQ', `${method}  ${paramsStr}`);
    try {
      const result = await proxy.call(method, paramsStr);
      let parsed;
      try { parsed = JSON.parse(result); }
      catch { parsed = result; }
      console.log('response', parsed);
      console.groupEnd();
      const display = typeof parsed === 'string' ? parsed : JSON.stringify(parsed, null, 2);
      addLog('ok', 'RES', display);
    } catch (err) {
      console.error('error', err);
      console.groupEnd();
      addLog('err', 'ERR', String(err));
    }
  }

  $('btn-call').addEventListener('click', () => {
    doCall($('rpc-method').value, $('rpc-params').value.trim() || '[]');
  });

  document.querySelectorAll('[data-quick]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [method, params] = JSON.parse(btn.dataset.quick);
      doCall(method, params);
    });
  });

  $('btn-clear').addEventListener('click', () => {
    const log = $('log');
    log.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'empty-state';
    empty.innerHTML = `
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3M5.25 3h13.5A2.25 2.25 0 0121 5.25v13.5A2.25 2.25 0 0118.75 21H5.25A2.25 2.25 0 013 18.75V5.25A2.25 2.25 0 015.25 3z" />
      </svg>
      <p>Start the proxy, then make RPC calls.</p>`;
    log.appendChild(empty);
  });

  // Update params hint when method changes
  const paramHints = {
    eth_blockNumber:                     '[]',
    eth_gasPrice:                        '[]',
    eth_blobBaseFee:                     '[]',
    eth_maxPriorityFeePerGas:            '[]',
    eth_getBalance:                      '["0xADDRESS","latest"]',
    eth_getTransactionCount:             '["0xADDRESS","latest"]',
    eth_getCode:                         '["0xADDRESS","latest"]',
    eth_getStorageAt:                    '["0xADDRESS","0x0","latest"]',
    eth_getBlockByNumber:                '["latest",false]',
    eth_getBlockByHash:                  '["0xBLOCKHASH",false]',
    eth_getBlockTransactionCountByNumber:'["latest"]',
    eth_getBlockReceipts:                '["latest"]',
    eth_getTransactionByHash:            '["0xTXHASH"]',
    eth_getTransactionReceipt:           '["0xTXHASH"]',
    eth_getLogs:                         '[{"fromBlock":"latest","toBlock":"latest"}]',
    eth_call:                            '[{"to":"0xCONTRACT","data":"0xCALLDATA"},"latest"]',
    eth_estimateGas:                     '[{"to":"0xCONTRACT","data":"0xCALLDATA"},"latest"]',
  };

  $('rpc-method').addEventListener('change', e => {
    const hint = paramHints[e.target.value];
    if (hint) $('rpc-params').value = hint;
  });
</script>

</body>
</html>
