name: Nightly build
on:
  schedule:
    - cron: "45 5 * * *"
  workflow_dispatch:

jobs:
  matrix_config:
    uses: ./.github/workflows/matrix_config.yml

  build:
    needs: matrix_config

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix_config.outputs.matrix) }}

    defaults:
      run:
        shell: bash

    name: 'build-${{ matrix.os }}-${{ matrix.cpu }}'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Extract branch name
        id: extract_branch
        run: echo "branch_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Build project
        id: make_dist
        run: |
          make dist-${{ matrix.os }}-${{ matrix.cpu }}
          cd dist
          ARCHIVE=$(echo *.tar.gz)
          tar -xzf ${ARCHIVE}
          NEW_ARCHIVE_DIR="nimbus-eth1-${{ matrix.os }}-${{ matrix.cpu }}-${{ steps.extract_branch.outputs.branch_name }}-$(git rev-parse --short=8 HEAD)"
          mv ${ARCHIVE%.tar.gz} ${NEW_ARCHIVE_DIR}
          tar -czf ${NEW_ARCHIVE_DIR}.tar.gz ${NEW_ARCHIVE_DIR}
          cp ${NEW_ARCHIVE_DIR}.tar.gz nimbus-eth1-${{ matrix.os }}-${{ matrix.cpu }}-nightly-latest.tar.gz
          echo "archive=${NEW_ARCHIVE_DIR}.tar.gz" >> $GITHUB_OUTPUT
          echo "archive_dir=${NEW_ARCHIVE_DIR}" >> $GITHUB_OUTPUT

      - name: Upload archive artefact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{ matrix.cpu }}-archive
          path: |
            ./dist/${{ steps.make_dist.outputs.archive }}
            ./dist/nimbus-eth1-${{ matrix.os }}-${{ matrix.cpu }}-nightly-latest.tar.gz
          retention-days: 2

      - name: Upload checksum artefact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{ matrix.cpu }}-checksum
          path: |
            ./dist/${{ steps.make_dist.outputs.archive_dir }}/build/nimbus.sha512sum
            ./dist/${{ steps.make_dist.outputs.archive_dir }}/build/nimbus_verified_proxy.sha512sum
            ./dist/${{ steps.make_dist.outputs.archive_dir }}/build/libverifproxy.a.sha512sum
          retention-days: 2

  build-wasm:
    name: 'wasm'
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git llvm

      - name: Install emsdk
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          emsdk/emsdk install 3.1.73
          emsdk/emsdk activate 3.1.73

      - name: Build Nim and dependencies
        run: make -j$(nproc) init

      - name: Build WASM
        run: |
          source emsdk/emsdk_env.sh
          make -j$(nproc) nimbus_verified_proxy_wasm

      - name: Generate sha512sums for WASM files
        run: |
          cd build/nimbus_verified_proxy_wasm
          sha512sum verifproxy_wasm.js verifproxy_wasm.wasm verifproxy.js > wasm.sha512sum

      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: build/nimbus_verified_proxy_wasm/
          retention-days: 2

  run-binary:
    needs: [build, matrix_config]

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix_config.outputs.matrix) }}

    defaults:
      run:
        shell: bash

    name: 'run-binary-${{ matrix.os }}-${{ matrix.cpu }}'
    runs-on: ${{ matrix.builder }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - id: shared-action
        uses: ./.github/actions/shared
        with:
          llvm-mingw: true
          nim-cache: false
          rocksdb-cache: false
          eest-cache: false

      - name: Download artefacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.os }}-${{ matrix.cpu }}-archive

      - name: Run binary
        run: |
          tar -xvzf nimbus-eth1-${{ matrix.os }}-${{ matrix.cpu }}-nightly-latest.tar.gz --strip-components=1
          build/nimbus --help
          build/nimbus_verified_proxy --help

      - name: Test libverifproxy
        run: |
          make libverifproxy_test
          build/libverifproxy_test

  deploy-wasm:
    name: Deploy WASM
    needs: [build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout wasm-deploy branch
        uses: actions/checkout@v6
        with:
          ref: wasm-deploy
          path: wasm-deploy/
        continue-on-error: true

      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm
          path: wasm-deploy/nightly/

      - name: Force-push to wasm-deploy
        run: |
          cd wasm-deploy
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update nightly"
          git push origin HEAD:wasm-deploy --force

  publish-wasm-npm:
    name: Publish WASM to GitHub Packages
    needs: [build-wasm]
    runs-on: ubuntu-22.04

    permissions:
      packages: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download WASM artefact
        uses: actions/download-artifact@v8
        with:
          name: wasm
          path: nimbus_verified_proxy/library/bindings/wasm/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@status-im'

      - name: Set nightly version
        run: |
          cd nimbus_verified_proxy/library/bindings/wasm
          npm version "0.0.0-nightly" --no-git-tag-version

      - name: Delete existing nightly package version
        run: |
          VERSION_ID=$(gh api /orgs/status-im/packages/npm/nimbus-verified-proxy/versions \
            --jq '.[] | select(.name == "0.0.0-nightly") | .id' 2>/dev/null || true)
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE /orgs/status-im/packages/npm/nimbus-verified-proxy/versions/$VERSION_ID
            echo "Deleted version ID $VERSION_ID"
          else
            echo "No existing nightly version found, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        run: npm publish --tag nightly
        working-directory: nimbus_verified_proxy/library/bindings/wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  remove-wasm-artifact:
    name: Remove WASM artifact
    needs: [deploy-wasm, publish-wasm-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Delete artefacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            wasm

  nightly-build-release:
    name: Nightly build release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Extract branch name
        id: extract_branch
        run: echo "branch_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Download artefacts
        uses: actions/download-artifact@v8

      - name: Create release notes
        run: |
          cat > release_notes.md <<EOF
          ## SHA512 checksums

          ### Nimbus

          \`\`\`text
          EOF
          echo '# Linux AMD64' >> release_notes.md
          cat linux-amd64-checksum/nimbus.sha512sum >> release_notes.md
          echo '# Linux ARM64' >> release_notes.md
          cat linux-arm64-checksum/nimbus.sha512sum >> release_notes.md
          echo '# Windows AMD64' >> release_notes.md
          cat windows-amd64-checksum/nimbus.sha512sum >> release_notes.md
          echo '# macOS ARM64' >> release_notes.md
          cat macos-arm64-checksum/nimbus.sha512sum >> release_notes.md
          echo '```' >> release_notes.md
          echo '' >> release_notes.md
          echo '### Nimbus Verified Proxy' >> release_notes.md
          echo '' >> release_notes.md
          echo '```' >> release_notes.md
          echo '# Linux AMD64' >> release_notes.md
          cat linux-amd64-checksum/nimbus_verified_proxy.sha512sum >> release_notes.md
          echo '# Linux ARM64' >> release_notes.md
          cat linux-arm64-checksum/nimbus_verified_proxy.sha512sum >> release_notes.md
          echo '# Windows AMD64' >> release_notes.md
          cat windows-amd64-checksum/nimbus_verified_proxy.sha512sum >> release_notes.md
          echo '# macOS ARM64' >> release_notes.md
          cat macos-arm64-checksum/nimbus_verified_proxy.sha512sum >> release_notes.md
          echo '```' >> release_notes.md
          echo '' >> release_notes.md
          echo '### libverifproxy' >> release_notes.md
          echo '' >> release_notes.md
          echo '```' >> release_notes.md
          echo '# Linux AMD64' >> release_notes.md
          cat linux-amd64-checksum/libverifproxy.a.sha512sum >> release_notes.md
          echo '# Linux ARM64' >> release_notes.md
          cat linux-arm64-checksum/libverifproxy.a.sha512sum >> release_notes.md
          echo '# Windows AMD64' >> release_notes.md
          cat windows-amd64-checksum/libverifproxy.a.sha512sum >> release_notes.md
          echo '# macOS ARM64' >> release_notes.md
          cat macos-arm64-checksum/libverifproxy.a.sha512sum >> release_notes.md
          echo '```' >> release_notes.md

      - name: Delete tag
        run: gh release delete $TAG --cleanup-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: nightly

      - name: Update Nightly Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: 'Nightly build ("${{ steps.extract_branch.outputs.branch_name }}" branch)'
          body_path: release_notes.md
          files: |
            linux-amd64-archive/*
            linux-arm64-archive/*
            windows-amd64-archive/*
            macos-arm64-archive/*

      - name: Delete artefacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            linux-amd64-archive
            linux-amd64-checksum
            linux-arm64-archive
            linux-arm64-checksum
            windows-amd64-archive
            windows-amd64-checksum
            macos-arm64-archive
            macos-arm64-checksum
            wasm
