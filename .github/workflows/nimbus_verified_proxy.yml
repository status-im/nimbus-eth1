name: Nimbus verified proxy CI
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'doc/**'
      - 'portal/docs/**'
      - '**/*.md'
      - 'portal/**'
      - '.github/workflows/portal.yml'
      - '.github/workflows/portal_docs.yml'
      - '.github/workflows/build_base_image.yml'
      - 'docker/**'
      - 'metrics/**'

  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'portal/docs/**'
      - '**/*.md'
      - 'portal/**'
      - '.github/workflows/portal.yml'
      - '.github/workflows/portal_docs.yml'
      - '.github/workflows/build_base_image.yml'
      - 'docker/**'
      - 'metrics/**'

  workflow_dispatch:

concurrency: # Cancel stale PR builds (but not push builds)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  matrix_config:
    uses: ./.github/workflows/matrix_config.yml

  build-wasm:
    name: 'wasm'
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout nimbus-eth1
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git llvm

      - name: Install emsdk
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          emsdk/emsdk install 3.1.73
          emsdk/emsdk activate 3.1.73

      - name: Build Nim and dependencies
        run: make -j$(nproc) init

      - name: Build WASM
        run: |
          source emsdk/emsdk_env.sh
          make -j$(nproc) nimbus_verified_proxy_wasm

  build:
    needs: matrix_config

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix_config.outputs.matrix) }}

    defaults:
      run:
        shell: bash

    name: '${{ matrix.os }}-${{ matrix.cpu }}'
    runs-on: ${{ matrix.builder }}
    steps:
      - name: Checkout nimbus-eth1
        uses: actions/checkout@v6

      - id: shared-action
        uses: ./.github/actions/shared
        with:
          llvm-mingw: true
          nim-cache: true
          rocksdb-cache: false
          eest-cache: false

      - name: Build and Run tests
        run: |
          gcc --version
          DEFAULT_MAKE_FLAGS="-j${ncpu}"
          make ${DEFAULT_MAKE_FLAGS} nimbus_verified_proxy
          build/nimbus_verified_proxy --help
          # "-static" option will not work for osx unless static system libraries are provided
          make ${DEFAULT_MAKE_FLAGS} nimbus_verified_proxy_test libverifproxy_test
